name: Lab86Mail
options:
  bundleIdPrefix: io.lab86
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"

packages:
  Clerk:
    url: https://github.com/clerk/clerk-ios.git
    from: 1.1.3
  ConvexMobile:
    url: https://github.com/get-convex/convex-swift.git
    from: 0.8.1

targets:
  Lab86Mail:
    type: application
    platform: macOS
    sources:
      - path: Lab86Mail/Sources
      - path: Lab86Mail/Resources
    dependencies:
      - package: Clerk
        product: ClerkKit
      - package: Clerk
        product: ClerkKitUI
      - package: ConvexMobile
        product: ConvexMobile
    entitlements:
      path: Lab86Mail/Supporting/Lab86Mail.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.downloads.read-write: true
        # NOTE: passkeys need `com.apple.developer.associated-domains:
        # [webcredentials:clerk.mail.lab86.io]` — but that entitlement forces a
        # provisioning profile and breaks ad-hoc dev builds. It's added in the
        # release/TestFlight signing config only (PLAN.md M8). Clerk already
        # serves the matching AASA. Until then, sign in with Google or email.
    info:
      path: Lab86Mail/Supporting/Info.plist
      properties:
        CFBundleDisplayName: Lab86 Mail
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "26.0"
        NSHumanReadableCopyright: "© 2026 Jakob Langtry"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lab86.mail.mac
        SWIFT_VERSION: "5.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5JZV7V6Y4Z
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        DEAD_CODE_STRIPPING: YES
