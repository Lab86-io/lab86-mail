name: CI

on:
  pull_request:
    branches:
      - staging
      - main
  push:
    branches:
      - staging
      - main

jobs:
  checks:
    name: Typecheck, Lint, Test, Build
    if: ${{ !contains(github.event.head_commit.message || '', '[skip release]') }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      actions: read # access workflow artifacts for coverage baselines
      pull-requests: write # post coverage summary comments on PRs
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test with coverage
        run: bun run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14

      - name: Coverage summary and PR comment
        uses: pento/lcov-coverage-check@v3
        if: always()
        with:
          lcov-file: coverage/lcov.info
          path: lib/
          new-file-minimum-coverage: 70
          changed-file-no-decrease: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install LCOV HTML report tools
        if: github.event_name == 'pull_request'
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov

      - name: HTML coverage report
        if: github.event_name == 'pull_request'
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: coverage/lcov.info
          artifact-name: code-coverage-report

      - name: Build
        run: bun run build
