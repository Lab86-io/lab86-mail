name: Deploy Development

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy development
    if: ${{ !contains(github.event.head_commit.message || '', '[skip release]') }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: development
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME || 'web' }}
      DEVELOPMENT_APP_URL: ${{ vars.DEVELOPMENT_APP_URL }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Deploy Convex
        env:
          DEPLOY_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$DEPLOY_COMMIT_MESSAGE" == *"[allow convex index cleanup]"* ]]; then
            npx convex deploy --allow-deleting-large-indexes
          else
            npx convex deploy
          fi
          migration_complete=false
          for attempt in {1..200}; do
            migration_result="$(npx convex run calendarData:completeCalendarSearchMigration '{}')"
            echo "$migration_result"
            if jq -e '.done == true' <<<"$migration_result" >/dev/null; then
              migration_complete=true
              break
            fi
          done
          if [ "$migration_complete" != true ]; then
            echo 'Calendar search migration did not complete within 200 bounded invocations.'
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.26.2

      - name: Prepare Railway deployment identity
        run: echo "RAILWAY_DEPLOY_MESSAGE=development ${GITHUB_SHA} run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Deploy Railway development
        run: >
          railway up
          --project "$RAILWAY_PROJECT_ID"
          --environment development
          --service "$RAILWAY_SERVICE_NAME"
          --ci
          -m "$RAILWAY_DEPLOY_MESSAGE"

      - name: Wait for Railway development release
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            deployment="$(railway deployment list \
              --project "$RAILWAY_PROJECT_ID" \
              --environment development \
              --service "$RAILWAY_SERVICE_NAME" \
              --limit 20 \
              --json | jq -c --arg message "$RAILWAY_DEPLOY_MESSAGE" \
                '[.[] | select(.meta.cliMessage == $message)] | first // empty')"
            if [ -n "$deployment" ]; then
              deployment_id="$(jq -r '.id' <<<"$deployment")"
              deployment_status="$(jq -r '.status' <<<"$deployment")"
              case "$deployment_status" in
                SUCCESS) echo "Railway deployment $deployment_id is ready."; exit 0 ;;
                FAILED|CRASHED|REMOVED) echo "Railway deployment $deployment_id ended as $deployment_status."; exit 1 ;;
              esac
            fi
            sleep 10
          done
          echo "Timed out waiting for Railway deployment: $RAILWAY_DEPLOY_MESSAGE"
          exit 1

      - name: Smoke test
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if curl --fail --show-error --silent "${DEVELOPMENT_APP_URL}/api/healthz"; then
              exit 0
            fi
            sleep 10
          done
          curl --fail --show-error --silent "${DEVELOPMENT_APP_URL}/api/healthz"
