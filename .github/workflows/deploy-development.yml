name: Deploy Development

on:
  push:
    branches:
      - staging

concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy development
    if: ${{ !contains(github.event.head_commit.message || '', '[skip release]') }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: development
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME || 'web' }}
      DEVELOPMENT_APP_URL: ${{ vars.DEVELOPMENT_APP_URL }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Deploy Convex
        env:
          DEPLOY_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$DEPLOY_COMMIT_MESSAGE" == *"[allow convex index cleanup]"* ]]; then
            npx convex deploy --allow-deleting-large-indexes
            npx convex run calendarData:purgeLegacyEventCorpusBatch '{}'
          else
            npx convex deploy
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.0.0

      - name: Deploy Railway development
        run: >
          railway up
          --project "$RAILWAY_PROJECT_ID"
          --environment development
          --service "$RAILWAY_SERVICE_NAME"
          --ci
          -m "development ${GITHUB_SHA}"

      - name: Smoke test
        run: |
          set -euo pipefail
          for attempt in {1..30}; do
            if curl --fail --show-error --silent "${DEVELOPMENT_APP_URL}/api/healthz"; then
              exit 0
            fi
            sleep 10
          done
          curl --fail --show-error --silent "${DEVELOPMENT_APP_URL}/api/healthz"
