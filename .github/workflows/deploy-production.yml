name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  release:
    name: Version, tag, and deploy production
    if: ${{ !contains(github.event.head_commit.message || '', '[skip release]') }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    environment: production
    env:
      GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME || 'web' }}
      PRODUCTION_APP_URL: ${{ vars.PRODUCTION_APP_URL }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN || github.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Collect release markers
        run: |
          set -euo pipefail
          last_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)"
          if [ -n "$last_tag" ]; then
            git log --format=%B "${last_tag}..HEAD" > .release-commits.txt
          else
            git log --format=%B HEAD > .release-commits.txt
          fi
          gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            -H "Accept: application/vnd.github+json" > .release-prs.json || echo '[]' > .release-prs.json

      - name: Bump package version
        id: version
        run: |
          set -euo pipefail
          version="$(node scripts/release-version.mjs --commits .release-commits.txt --prs .release-prs.json)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Commit and tag version locally
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          git config user.name "lab86-release-bot"
          git config user.email "release-bot@lab86.io"
          git add package.json
          git commit -m "Release v${version} [skip release]"
          git tag -a "v${version}" -m "Release v${version} from ${GITHUB_SHA}"

      - name: Deploy Convex
        run: npx convex deploy

      - name: Install Railway CLI
        run: npm install -g @railway/cli@5.0.0

      - name: Deploy Railway production
        run: >
          railway up
          --project "$RAILWAY_PROJECT_ID"
          --environment production
          --service "$RAILWAY_SERVICE_NAME"
          --ci
          -m "production v${{ steps.version.outputs.version }}"

      - name: Smoke test
        run: curl --fail --show-error --silent "${PRODUCTION_APP_URL}/api/healthz"

      - name: Push release commit and tag
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${version}"
